syntax = "proto3";
package master;

option go_package = "map-reduce/gen/master;masterpb";

service Master {
  rpc ReportCompletion(WorkerId) returns (ReportCompletionResponse) {}
  rpc RegiserWorker(WorkerData) returns (RegisterWorkerResponse) {}
}

message WorkerId {
  string id = 1;
  string taskId = 2;
  string taskType = 3;
}

message WorkerData {
  string id = 1;
  string address = 2;
}

message ReportCompletionResponse {
  bool accepted = 1;
}

message RegisterWorkerResponse {
  bool registered = 1;
}
